<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
  <title>AI Configs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #7d8590;
      --green: #3fb950; --yellow: #d29922; --red: #f85149;
      --blue: #58a6ff; --purple: #bc8cff;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; min-height: 100vh; user-select: none;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface);
      -webkit-app-region: drag;
    }
    header * { -webkit-app-region: no-drag; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 15px; font-weight: 600; }

    .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
    .badge-blue  { background: #1f3a5f; color: var(--blue); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #21262d; border-color: #6e7681; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .layout {
      display: grid; grid-template-columns: 1fr 420px;
      height: calc(100vh - 53px);
    }

    .projects-panel { padding: 20px 24px; overflow-y: auto; border-right: 1px solid var(--border); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .panel-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .project-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; margin-bottom: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; transition: border-color 0.15s;
    }
    .project-card:hover   { border-color: #6e7681; }
    .project-card.syncing { border-color: var(--blue); }
    .project-card.success { border-color: var(--green); }

    .project-info { flex: 1; min-width: 0; margin-right: 12px; }
    .project-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .project-path { font-size: 11px; color: var(--muted); font-family: "Cascadia Code", "Fira Code", monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-status { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }

    .group-header { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
    .group-header:first-child { margin-top: 0; }

    .terminal-panel { display: flex; flex-direction: column; background: #010409; }
    .terminal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .terminal-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .terminal-output {
      flex: 1; overflow-y: auto; padding: 16px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    }

    .line-normal  { color: #c9d1d9; }
    .line-error   { color: var(--red); }
    .line-success { color: var(--green); }
    .line-warn    { color: var(--yellow); }
    .line-info    { color: var(--blue); }
    .line-dim     { color: var(--muted); }

    .git-panel { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
    .git-log-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .git-log-line { font-family: "Cascadia Code", "Fira Code", monospace; font-size: 11px; margin-bottom: 3px; }
    .git-sha { color: var(--purple); margin-right: 8px; }
    .git-msg { color: #c9d1d9; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚙️ AI Configs</h1>
    <span class="badge badge-blue" id="env-badge">loading</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="last-sync" style="font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-primary" id="btn-sync-all">▶ Sync All</button>
  </div>
</header>

<div class="layout">
  <div class="projects-panel">
    <div class="panel-header">
      <span class="panel-title">Projects</span>
      <span id="project-count" class="badge badge-blue">0</span>
    </div>
    <div id="project-list"></div>
  </div>

  <div class="terminal-panel">
    <div class="terminal-header">
      <span class="terminal-title">Output</span>
      <button class="btn btn-sm" id="btn-clear">Clear</button>
    </div>
    <div class="terminal-output" id="terminal"></div>
    <div class="git-panel">
      <div class="git-log-title">Recent commits</div>
      <div id="git-log"></div>
    </div>
  </div>
</div>

<script>
  // ---- Debug: check preload ----
  console.log("[renderer] window.api =", window.api);
  console.log("[renderer] typeof window.api =", typeof window.api);
  if (!window.api) {
    document.body.style.background = "#300";
    document.querySelector("header h1").textContent = "❌ window.api not found — preload failed";
    throw new Error("window.api is undefined — preload script did not load");
  }

  const api = window.api;
  let isSyncing = false;
  let offSyncLine = null;

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  // ---- Projects ----
  async function loadProjects() {
    const projects = await api.getProjects();
    document.getElementById("project-count").textContent = projects.length;

    const groups = {};
    for (const p of projects) {
      const prefix = p.name.split("-")[0];
      if (!groups[prefix]) groups[prefix] = [];
      groups[prefix].push(p);
    }

    const list = document.getElementById("project-list");
    list.textContent = "";
    for (const [group, items] of Object.entries(groups)) {
      list.appendChild(el("div", "group-header", group));
      for (const p of items) list.appendChild(makeCard(p));
    }

    // Set env badge from platform
    const plat = navigator.userAgent.includes("Windows") ? "windows"
               : navigator.userAgent.includes("Mac")     ? "macos" : "linux";
    document.getElementById("env-badge").textContent = plat;
  }

  function makeCard(p) {
    const card = el("div", "project-card");
    card.id = `card-${p.name}`;

    const info = el("div", "project-info");
    const nameRow = el("div", "project-name");
    nameRow.appendChild(el("span", `dot ${p.hasConfig ? "dot-green" : "dot-yellow"}`));
    nameRow.appendChild(document.createTextNode(" " + p.name));
    info.appendChild(nameRow);
    info.appendChild(el("div", "project-path", p.path));
    info.appendChild(el("div", "project-status",
      p.lastSync ? "synced " + timeAgo(p.lastSync) : "not synced yet"
    ));
    card.appendChild(info);

    const btn = el("button", "btn btn-sm", "Sync");
    btn.addEventListener("click", () => runSync(p.name));
    card.appendChild(btn);
    return card;
  }

  // ---- Git log ----
  async function loadGitLog() {
    const log = await api.getGitLog();
    const container = document.getElementById("git-log");
    container.textContent = "";
    for (const line of (log || "").split("\n").filter(Boolean)) {
      const parts = line.split(" ");
      const row = el("div", "git-log-line");
      row.appendChild(el("span", "git-sha", parts[0]));
      row.appendChild(el("span", "git-msg", parts.slice(1).join(" ")));
      container.appendChild(row);
    }
  }

  // ---- Sync ----
  document.getElementById("btn-sync-all").addEventListener("click", () => runSync(""));

  async function runSync(project) {
    if (isSyncing) return;
    isSyncing = true;

    const btn = document.getElementById("btn-sync-all");
    btn.disabled = true;
    btn.textContent = "";
    btn.appendChild(el("span", "spinner"));
    btn.appendChild(document.createTextNode(" Syncing..."));

    const card = project ? document.getElementById(`card-${project}`) : null;
    if (card) card.className = "project-card syncing";

    termClear();
    termAppend(project ? `▶ Syncing: ${project}\n` : "▶ Syncing all projects...\n", "info");

    // Register IPC listener before invoking
    offSyncLine = api.onSyncLine((data) => {
      if (data.done) {
        termAppend(data.code === 0 ? "\n✅ Done\n" : "\n❌ Exited with error\n",
          data.code === 0 ? "success" : "error");
        finishSync();
      } else if (data.line) {
        renderOutputLine(data.line, !!data.error);
      }
    });

    await api.sync(project);
  }

  async function finishSync() {
    if (offSyncLine) { offSyncLine(); offSyncLine = null; }
    isSyncing = false;

    const btn = document.getElementById("btn-sync-all");
    btn.disabled = false;
    btn.textContent = "▶ Sync All";

    document.getElementById("last-sync").textContent =
      "last sync: " + new Date().toLocaleTimeString();

    document.querySelectorAll(".project-card.syncing").forEach((c) => {
      c.className = "project-card";
    });

    await loadProjects();
    await loadGitLog();
  }

  // ---- Terminal ----
  const terminal = document.getElementById("terminal");

  function termClear() { terminal.textContent = ""; }

  function termAppend(text, cls) {
    terminal.appendChild(el("span", `line-${cls}`, text));
    terminal.scrollTop = terminal.scrollHeight;
  }

  function renderOutputLine(text, isError) {
    const segments = text.split(/(\r?\n)/);
    for (const seg of segments) {
      if (seg === "\n" || seg === "\r\n") {
        terminal.appendChild(document.createTextNode("\n"));
        continue;
      }
      if (!seg) continue;
      const cls = isError          ? "error"
        : seg.includes("✅")       ? "success"
        : seg.includes("⚠️")      ? "warn"
        : seg.includes("❌")       ? "error"
        : seg.includes("ℹ️")      ? "dim"
        : seg.includes("📥")      ? "info"
        : seg.includes("█") || seg.includes("░") ? "info"
        : "normal";
      terminal.appendChild(el("span", `line-${cls}`, seg));
    }
    terminal.scrollTop = terminal.scrollHeight;
  }

  document.getElementById("btn-clear").addEventListener("click", termClear);

  // ---- Helpers ----
  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return "just now";
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  // ---- Init ----
  loadProjects();
  loadGitLog();
  termAppend('Ready. Press "Sync All" or sync a project.\n', "dim");
</script>
</body>
</html>
